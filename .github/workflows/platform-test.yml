# https://help.github.com/en/categories/automating-your-workflow-with-github-actions

name: "Platform test"

on:
  pull_request:
  push:
    branches:
      - "2.0.x"

permissions:
  contents: read

jobs:
  tests:
    name: "Platform test"
    runs-on: "ubuntu-latest"
    env:
      MYSQL_HOST: '127.0.0.1'
      PGSQL_HOST: '127.0.0.1'

    strategy:
      fail-fast: false
      matrix:
        php-version:
          - "7.4"
          - "8.0"
          - "8.1"
          - "8.2"
          - "8.3"
          - "8.4"
        update-packages:
          - ""
        include:
          - php-version: "8.1"
            update-packages: doctrine/orm:^3.0 doctrine/dbal:^4.0 carbonphp/carbon-doctrine-types:^3 gedmo/doctrine-extensions:^3
          - php-version: "8.2"
            update-packages: doctrine/orm:^3.0 doctrine/dbal:^4.0 carbonphp/carbon-doctrine-types:^3 gedmo/doctrine-extensions:^3
          - php-version: "8.3"
            update-packages: doctrine/orm:^3.0 doctrine/dbal:^4.0 carbonphp/carbon-doctrine-types:^3 gedmo/doctrine-extensions:^3
          - php-version: "8.4"
            update-packages: doctrine/orm:^3.0 doctrine/dbal:^4.0 carbonphp/carbon-doctrine-types:^3 gedmo/doctrine-extensions:^3

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: "Checkout"
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: "Install PHP"
        uses: "shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1" # v2
        with:
          coverage: "none"
          php-version: "${{ matrix.php-version }}"
          ini-file: development
          extensions: pdo, mysqli, pgsql, pdo_mysql, pdo_pgsql, pdo_sqlite, mongodb

      - name: "Install dependencies"
        run: "composer install --no-interaction --no-progress"

      - name: "Update packages"
        if: ${{ matrix.update-packages != '' }}
        run: composer require --dev ${{ matrix.update-packages }} -W

      - name: "Run platform matrix test"
        run: vendor/bin/phpunit --group=platform

    services:
      postgres:
        image: "postgres:latest"
        env:
          POSTGRES_PASSWORD: "secret"
          POSTGRES_USER: root
          POSTGRES_DB: foo
        ports:
          - "5432:5432"

      mysql:
        image: "mysql:latest"
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: foo
        ports:
          - "3306:3306"
